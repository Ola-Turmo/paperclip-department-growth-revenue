name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  plugin-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332

      - name: Setup Bun
        uses: oven-sh/setup-bun@1a97b6e6af1ed1e6eda71bae12f49235d41e1cd5
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Python ML dependencies
        run: pip install dowhy causalnex pandas scikit-learn --quiet

      - name: TypeScript check
        run: bun run check

      - name: Build
        run: bun run build

      - name: Run tests
        run: bun run test
